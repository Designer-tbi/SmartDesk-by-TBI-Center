  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the SmartDesk PWA service worker so the browser
      // surfaces the install prompt (`beforeinstallprompt` event) on
      // mobile/tablet/desktop. The SW itself is online-first and
      // never caches API responses (multi-tenant safe).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) =>
            console.log('SW register failed:', err),
          );
        });
      }
    </script>
  </body>
